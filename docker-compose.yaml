services:
  app:
    build: .
    ports:
      - "9002:8000"
    volumes:
      - ./test-media:/media
      - thumbnails:/app/thumbnails
      - db_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - MEDIA_BASE_DIR=/media
      - ADMIN_PASSWORD=admin
      - DATABASE_URL=sqlite:///data/avm.db
      - THUMBNAIL_DIR=/app/thumbnails
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "9080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./test-media:/media:ro
      - thumbnails:/thumbnails:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  thumbnails:
  db_data:
